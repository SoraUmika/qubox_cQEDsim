      - Displacement & Qubit Spectroscopy: tutorials/displacement_spectroscopy.md
      - Kerr Free Evolution: tutorials/kerr_free_evolution.md
      - Sideband Swap: tutorials/sideband_swap.md
      - Unitary Synthesis: tutorials/unitary_synthesis.md
      - GRAPE Optimal Control: tutorials/optimal_control.md
