      - Pulse Construction: user_guides/pulse_construction.md
      - Sequence Compilation: user_guides/sequence_compilation.md
      - Running Simulations: user_guides/running_simulations.md
      - Floquet Analysis: user_guides/floquet_analysis.md
      - Extracting Observables: user_guides/extracting_observables.md
      - State Preparation & Measurement: user_guides/state_prep_measurement.md
      - Open System Dynamics: user_guides/open_system_dynamics.md
      - Semi-Autonomous Agent Workflow: user_guides/agent_workflow.md
  - Tutorials:
